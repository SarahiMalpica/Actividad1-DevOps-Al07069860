<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actividad 1 version consola</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .card {
      margin: 0;
      background: #ffffff;
      border: 1px solid #d9e2f2;
      border-radius: 10px;
      padding: 18px 24px;
      text-align: center;
      max-width: 480px;
    }

    .line1 {
      margin: 0;
      font-size: 1rem;
      color: #2563eb;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .line2 {
      margin: 8px 0 0;
      font-size: clamp(1.2rem, 3.8vw, 1.8rem);
      font-weight: 700;
      color: #111827;
    }
  </style>
</head>
<body>
  <section class="card">
    <p class="line1">Version Consola</p>
    <p class="line2">Pagina Web Actividad 1 DevOps</p>
  </section>
</body>
</html>
